<!DOCTYPE html>
<html lang="es">
<head>
    <title>Buscador de Cuentas - Planta Externa</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: #2a2a2a; padding: 20px; border-radius: 8px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 4px; border: none; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; }
        #resultado { margin-top: 20px; padding: 10px; border-top: 1px solid #444; }
        .encontrado { color: #44ff44; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h3>Consulta de Puertos TP</h3>
        <input type="text" id="tpId" placeholder="Ej: TP509438">
        <input type="text" id="cuentaBusqueda" placeholder="Número de cuenta o Serie">
        <button onclick="buscar()">Buscar en Red</button>
        
        <div id="resultado">Esperando consulta...</div>
    </div>

    <script>
        async function buscar() {
            const tp = document.getElementById('tpId').value.trim();
            const cuenta = document.getElementById('cuentaBusqueda').value.trim();
            const resDiv = document.getElementById('resultado');
            
            resDiv.innerHTML = "Consultando...";

            try {
                // Nota: Si da error de CORS, se requiere un proxy o usarlo como extensión
                const response = await fetch(`/api-totalplay/gsa/lite/v1/port/qr?qr=${tp}`);
                const data = await response.json();
                
                const puertos = data.splitters[0].listmodelpuertos;
                const hallazgo = puertos.find(p => p.cuenta === cuenta || p.serie === cuenta);

                if (hallazgo) {
                    resDiv.innerHTML = `<div class="encontrado">
                        ¡Cuenta Localizada!<br>
                        Puerto: ${hallazgo.numeroPuerto}<br>
                        Estado: ${hallazgo.descripcionPuerto}<br>
                        OT: ${hallazgo.ot || 'N/A'}
                    </div>`;
                } else {
                    resDiv.innerHTML = "No se encontró la cuenta en este TP.";
                }
            } catch (error) {
                resDiv.innerHTML = "Error: No se pudo conectar con el API. Verifica tu sesión en Sistemas STP.";
            }
        }
    </script>
</body>
</html>
